<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise Sprint Hero Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .mission-card { transition: all 0.3s ease; cursor: pointer; }
        .mission-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .badge-active { border: 2px solid #3b82f6; background: #eff6ff; }
        .completed-glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); border-color: #22c55e !important; }
        .nav-button:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900 pb-32">

    <header class="bg-blue-700 text-white p-6 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase leading-none">Sunrise Hero</h1>
                <p class="text-[10px] opacity-80 uppercase tracking-widest mt-1">Status: Day 1 - March 16</p>
            </div>
            <div class="text-right">
                <span id="currentWeightDisplay" class="text-3xl font-black leading-none">105.0</span>
                <span class="text-[10px] block uppercase tracking-widest opacity-80">Current KG</span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <section class="space-y-4">
            <div class="flex items-center justify-between px-2">
                <h2 class="text-sm font-black text-gray-400 uppercase tracking-[0.2em]">Current Mission</h2>
                <span class="text-blue-600 font-bold italic">Mon, Mar 16</span>
            </div>

            <!-- MAIN MISSION -->
            <div id="mainMissionBox" class="bg-white rounded-3xl p-6 shadow-2xl border-4 border-blue-100 relative overflow-hidden transition-all duration-500">
                <div id="missionContent" class="space-y-4">
                    <div>
                        <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">Target</p>
                        <p class="text-2xl font-black text-gray-800 leading-tight">🛡️ Recovery & Stretch</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <div class="bg-green-50/50 p-4 rounded-2xl border border-green-100">
                            <p class="text-[8px] font-black text-green-500 uppercase mb-1">Meal 1 (12:00)</p>
                            <p class="text-xs font-bold text-gray-700">Avocado Toast + 2 Eggs</p>
                        </div>
                        <div class="bg-green-50/50 p-4 rounded-2xl border border-green-100">
                            <p class="text-[8px] font-black text-green-500 uppercase mb-1">Meal 2 (19:30)</p>
                            <p class="text-xs font-bold text-gray-700">Tofu Tomato + Greens</p>
                        </div>
                    </div>
                </div>
                
                <div class="mt-6 pt-4 border-t border-gray-100">
                    <button id="completeBtn" onclick="toggleMissionComplete()" class="w-full py-4 rounded-2xl font-black uppercase tracking-widest text-sm transition-all duration-300 flex items-center justify-center gap-2 bg-blue-100 text-blue-600">
                        <i id="completeBtnIcon" class="fa-solid fa-circle-check"></i>
                        <span id="completeBtnText">Log Completion</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Stats -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-blue-50 p-6 rounded-3xl border-2 border-blue-100">
                <h3 class="font-black text-blue-800 text-[10px] uppercase tracking-widest mb-4"><i class="fa-solid fa-bottle-water mr-2"></i>Hydration</h3>
                <div class="grid grid-cols-5 gap-3" id="waterLog"></div>
            </div>
            <div class="bg-gray-100 p-6 rounded-3xl border-2 border-gray-200">
                <h3 class="font-black text-gray-600 text-[10px] uppercase tracking-widest mb-4">Training Block</h3>
                <p class="text-sm font-bold text-gray-500">WEEK 8: BASE PHASE</p>
                <div class="w-full bg-gray-200 h-2 rounded-full mt-2 overflow-hidden">
                    <div class="bg-blue-600 h-full w-[12.5%]"></div>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-sm border-t border-gray-200 p-4 z-50">
        <div class="max-w-4xl mx-auto flex justify-center items-center px-4">
            <button onclick="updateWeightModal()" class="bg-blue-700 text-white px-12 py-4 rounded-2xl font-black uppercase tracking-widest text-sm nav-button">Update Weight</button>
        </div>
    </nav>

    <!-- Weight Modal -->
    <div id="weightModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl text-center">
            <h2 class="text-lg font-black uppercase tracking-widest text-gray-400 mb-2">Morning Check-in</h2>
            <input type="number" id="weightInput" step="0.1" class="w-full text-5xl font-black text-center border-b-4 border-blue-500 focus:outline-none p-4 mb-8">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeModal()" class="text-gray-400 font-black py-4 uppercase text-xs">Cancel</button>
                <button onclick="saveWeight()" class="bg-blue-700 text-white font-black rounded-2xl py-4 uppercase text-xs">Save</button>
            </div>
        </div>
    </div>

    <script>
        let userState = { currentWeight: 105.0, waterBottles: 0, completed: false };

        function toggleMissionComplete() {
            userState.completed = !userState.completed;
            if (userState.completed) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            render();
        }

        function render() {
            document.getElementById('currentWeightDisplay').innerText = userState.currentWeight.toFixed(1);
            const box = document.getElementById('mainMissionBox');
            const btn = document.getElementById('completeBtn');
            
            if (userState.completed) {
                box.classList.add('completed-glow');
                btn.className = "w-full py-4 rounded-2xl font-black uppercase text-sm bg-green-500 text-white flex justify-center items-center gap-2";
                document.getElementById('completeBtnText').innerText = "Mission Complete";
            } else {
                box.classList.remove('completed-glow');
                btn.className = "w-full py-4 rounded-2xl font-black uppercase text-sm bg-blue-100 text-blue-600 flex justify-center items-center gap-2";
                document.getElementById('completeBtnText').innerText = "Log Completion";
            }
            renderWater();
        }

        function renderWater() {
            const container = document.getElementById('waterLog');
            container.innerHTML = '';
            for(let i=1; i<=5; i++) {
                const active = i <= userState.waterBottles ? 'text-blue-500' : 'text-blue-100';
                container.innerHTML += `<i class="fa-solid fa-droplet text-3xl cursor-pointer ${active}" onclick="userState.waterBottles=${i}; renderWater()"></i>`;
            }
        }

        function updateWeightModal() { document.getElementById('weightInput').value = userState.currentWeight; document.getElementById('weightModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('weightModal').classList.add('hidden'); }
        function saveWeight() { userState.currentWeight = parseFloat(document.getElementById('weightInput').value); render(); closeModal(); }

        window.onload = render;
    </script>
</body>
</html>
